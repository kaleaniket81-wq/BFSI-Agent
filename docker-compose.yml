services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bfsi_postgres
    environment:
      POSTGRES_DB:       ${DB_NAME:-bfsi_intelligence}
      POSTGRES_USER:     ${DB_USER:-bfsi_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/schemas/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bfsi_user} -d ${DB_NAME:-bfsi_intelligence}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bfsi_redis
    ports: ["6379:6379"]
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    container_name: bfsi_ollama
    ports: ["11434:11434"]
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  ollama-init:
    image: ollama/ollama:latest
    container_name: bfsi_ollama_init
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        echo 'Pulling llama3...' &&
        ollama pull llama3 &&
        echo 'Pulling nomic-embed-text...' &&
        ollama pull nomic-embed-text &&
        echo 'All models ready!'
      "
    restart: "no"

  api:
    build: { context: ., dockerfile: api/Dockerfile }
    container_name: bfsi_api
    env_file: .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OLLAMA_BASE_URL: http://ollama:11434
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      ollama:   { condition: service_healthy }
    volumes: ["./uploads:/app/uploads"]
    restart: on-failure

  worker:
    build: { context: ., dockerfile: api/Dockerfile }
    container_name: bfsi_worker
    command: celery -A worker.src.tasks.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      ollama:   { condition: service_healthy }
    volumes: ["./uploads:/app/uploads"]
    restart: on-failure

  gateway:
    build: ./gateway
    container_name: bfsi_gateway
    environment: { FASTAPI_URL: "http://api:8000" }
    ports: ["9090:9090"]
    depends_on: [api]
    restart: on-failure

  frontend:
    build: ./frontend
    container_name: bfsi_frontend
    ports: ["3000:3000"]
    environment: { REACT_APP_GATEWAY_URL: "http://localhost:9090" }
    depends_on: [gateway]

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bfsi_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@bfsi.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports: ["5050:80"]
    depends_on:
      postgres: { condition: service_healthy }

volumes:
  postgres_data:
  ollama_models:
