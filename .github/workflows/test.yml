name: Run Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  python-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB:       bfsi_intelligence_test
          POSTGRES_USER:     bfsi_user
          POSTGRES_PASSWORD: testpassword
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov httpx

      - name: Run DB migrations
        env:
          DB_HOST:     localhost
          DB_NAME:     bfsi_intelligence_test
          DB_USER:     bfsi_user
          DB_PASSWORD: testpassword
        run: psql -h localhost -U bfsi_user -d bfsi_intelligence_test -f data/schemas/init.sql
        env:
          PGPASSWORD: testpassword

      - name: Run unit tests
        env:
          DB_HOST:      localhost
          DB_NAME:      bfsi_intelligence_test
          DB_USER:      bfsi_user
          DB_PASSWORD:  testpassword
          LLM_PROVIDER: mock
          ENVIRONMENT:  test
        run: pytest tests/unit/ -v --cov=api --cov=rag --cov=ingestion --cov=analytics --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  java-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - name: Build and test gateway
        working-directory: gateway
        run: mvn test -q
